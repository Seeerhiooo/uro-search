<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URO Archive Search</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
  input { width: 70%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 10px 20px; font-size: 16px; background: #8B0000; color: white; border: none; border-radius: 4px; cursor: pointer; }
  .result { border-bottom: 1px solid #eee; padding: 15px 0; }
  .title { font-size: 18px; font-weight: bold; color: #8B0000; }
  .meta { color: #666; font-size: 13px; margin: 5px 0; }
  .summary { font-size: 14px; margin-top: 8px; }
  .score { color: #999; font-size: 12px; }
</style>
</head>
<body>

<h2>URO Archive — Semantic Search</h2>

<div>
  <input type="text" id="query" placeholder="Search in English, Hebrew, or German..." />
  <button onclick="search()">Search</button>
</div>

<div id="results" style="margin-top: 30px;"></div>

<script>
async function search() {
  const query = document.getElementById('query').value;
  if (!query) return;

  document.getElementById('results').innerHTML = '<p>Searching...</p>';

  const response = await fetch(`/api/?q=${encodeURIComponent(query)}`);
  const data = await response.json();

  if (!data || data.length === 0) {
    document.getElementById('results').innerHTML = '<p>No results found.</p>';
    return;
  }

  const html = data.map(match => {
    const m = match.metadata;
    const score = Math.round(match.score * 100);
    return `
      <div class="result">
        <div class="title">${m.title || 'No title'}</div>
        <div class="meta">
          📅 ${m.date || '—'} &nbsp;|&nbsp;
          📁 ${m.collection || '—'} &nbsp;|&nbsp;
          📍 ${m.places || '—'}
        </div>
        <div class="summary">${m.summary ? m.summary.substring(0, 300) + '...' : ''}</div>
        <div class="score">Relevance: ${score}%</div>
      </div>
    `;
  }).join('');

  document.getElementById('results').innerHTML = html;
}

document.getElementById('query').addEventListener('keypress', e => {
  if (e.key === 'Enter') search();
});
</script>

</body>
</html>
